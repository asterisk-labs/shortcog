name: ci

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: install gdal and zstd
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y libgdal-dev libzstd-dev
          else
            brew install gdal zstd
          fi

      - name: configure
        run: cmake -S . -B build -DSHORTCOG_BUILD_TESTS=ON

      - name: build
        run: cmake --build build -j

      - name: test
        run: ctest --test-dir build --output-on-failure
